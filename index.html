<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stellarOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300&display=swap" rel="stylesheet">
    
    <style>
        /* Base styles using Poppins Light */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
            background-color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }

        /* Header layout containing the OS name and the menu */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid #eaeaea;
        }

        /* Specific gray styling for the lowercase OS name */
        .logo {
            font-size: 24px;
            color: #707070;
            text-transform: none;
        }

        /* Navigation menu styling */
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: #333333;
            font-size: 16px;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: #707070;
        }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            header {
                flex-direction: column; /* Stacks the logo above the menu */
                gap: 15px;
                padding: 20px 20px;
                text-align: center;
            }

            nav ul {
                gap: 15px; /* Pulls links slightly closer on small screens */
                flex-wrap: wrap; /* Allows links to wrap to a new line if screen is tiny */
                justify-content: center;
            }

            nav a {
                font-size: 15px; /* Slightly smaller font for mobile screens */
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">stellarOS</div>
        
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Downloads</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Requirements</a></li>
            </ul>
        </nav>
    </header>

    </body>
</html>
