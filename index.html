<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stellarOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300&display=swap" rel="stylesheet">
    
    <style>
        /* Base styles using Poppins Light */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
            background-color: #ffffff;
        }

        /* Header layout containing the OS name and the menu */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid #eaeaea; /* Subtle bottom border for clean structure */
        }

        /* Specific gray styling for the lowercase OS name */
        .logo {
            font-size: 24px;
            color: #707070; /* Sleek gray color */
            text-transform: none; /* Ensures text stays exactly as typed */
        }

        /* Navigation menu styling */
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 30px; /* Spacing between menu options */
        }

        nav a {
            text-decoration: none;
            color: #333333;
            font-size: 16px;
            transition: color 0.2s ease;
        }

        /* Subtle hover effect for testing links */
        nav a:hover {
            color: #707070;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">stellarOS</div>
        
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Downloads</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Requirements</a></li>
            </ul>
        </nav>
    </header>

    </body>
</html>
