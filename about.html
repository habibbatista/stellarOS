<!DOCTYPE html>
<html>
<head>
  <title>About</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="nav">
  <div class="logo">klazyOS</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </nav>
</header>

<section class="section">
  <h2>About klazyOS</h2>

  <div class="text-block">
    <p>klazyOS is a kernel-based operating system designed for modern computing environments.</p>
    <p>It focuses on performance, modular architecture, and long-term scalability.</p>
  </div>
</section>

<script>
window.addEventListener("DOMContentLoaded", () => {
  document.body.classList.add("loaded");
});

document.querySelectorAll("a").forEach(a => {
  if (a.href.startsWith(window.location.origin)) {
    a.addEventListener("click", e => {
      e.preventDefault();
      document.body.classList.remove("loaded");
      setTimeout(() => window.location = a.href, 300);
    });
  }
});
</script>

</body>
</html>
